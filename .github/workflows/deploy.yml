name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Test frontend
        run: npm test
        working-directory: frontend

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install infrastructure dependencies
        run: npm ci
        working-directory: infrastructure

      - name: Build backend
        run: npm run build-backend
        working-directory: infrastructure

      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist

      - name: Deploy DNS stack
        run: npx cdk deploy DnsStack --require-approval never
        working-directory: infrastructure

      - name: Deploy certificate stack
        run: npx cdk deploy CertificateStack --require-approval never
        working-directory: infrastructure

      - name: Deploy backend stack
        run: npx cdk deploy BackendStack --outputs-file cdk-outputs.json --require-approval never
        working-directory: infrastructure

      - name: Build frontend
        run: npm run build-frontend
        working-directory: infrastructure

      - name: Deploy frontend stack
        run: npx cdk deploy FrontendStack --require-approval never
        working-directory: infrastructure
